<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Surprise Sakhile Ndlovu</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #f7f7f7;
    }

    header, footer {
      background-color: #222;
      color: #fff;
      text-align: center;
      padding: 1rem;
    }

    nav a {
      color: #fff;
      margin: 0 10px;
      text-decoration: none;
    }

    main {
      max-width: 600px;
      margin: 2rem auto;
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    button {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      border: none;
      background-color: #0066cc;
      color: #fff;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #004c99;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .message {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 4px;
      display: none;
    }

    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
  </style>
</head>
<body>

  <header>
    <h1>Contact Me</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="Projects.html">Projects</a>
      <a href="Blogs.html">Blogs</a>
      <a href="Contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <form id="contactForm">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" required />

      <label for="message">Your Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit" id="submitBtn">Send Message</button>

      <div id="responseMessage" class="message"></div>
    </form>
  </main>

  <footer>
    © 2025 Surprise Sakhile Ndlovu
    <div class="social-icons" style="margin-top: 1rem;">
      <a href="https://github.com/Sakhilendlovu" target="_blank"><i class="fab fa-github fa-lg"></i></a>
      <a href="https://www.linkedin.com/in/surprise-sakhile-ndlovu-880a836a" target="_blank"><i class="fab fa-linkedin fa-lg"></i></a>
      <a href="https://twitter.com/therealsakhile" target="_blank"><i class="fab fa-twitter fa-lg"></i></a>
      <a href="https://facebook.com/therealsakhile" target="_blank"><i class="fab fa-facebook fa-lg"></i></a>
      <a href="https://instagram.com/therealsakhile" target="_blank"><i class="fab fa-instagram fa-lg"></i></a>
      <a href="https://medium.com/@ndlovusakhile698" target="_blank"><i class="fab fa-medium fa-lg"></i></a>
    </div>
  </footer>

  <script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;
      const submitBtn = document.getElementById('submitBtn');
      const responseMessage = document.getElementById('responseMessage');

      // Disable button during submission
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const response = await fetch('http://localhost:3000/api/contact', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ name, email, message }),
        });

        const data = await response.json();

        if (response.ok) {
          responseMessage.classList.remove('error');
          responseMessage.classList.add('success');
          responseMessage.textContent = '✓ Message sent successfully! I\'ll get back to you soon.';
          document.getElementById('contactForm').reset();
        } else {
          responseMessage.classList.remove('success');
          responseMessage.classList.add('error');
          responseMessage.textContent = '✗ Error: ' + (data.error || 'Failed to send message');
        }
      } catch (error) {
        responseMessage.classList.remove('success');
        responseMessage.classList.add('error');
        responseMessage.textContent = '✗ Connection error. Please try again.';
        console.error('Error:', error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
      }
    });
  </script>

</body>
</html>
